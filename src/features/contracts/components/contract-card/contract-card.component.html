  <div (click)="select.emit()"
    class="group bg-white dark:bg-card-dark rounded-xl border border-gray-200 dark:border-gray-700 shadow-sm hover:shadow-lg transition-all duration-300 flex flex-col p-4 min-h-[160px] cursor-pointer"
    [ngClass]="cardBorderClass()">
    <!-- Header -->
    <div class="flex justify-between items-start gap-2 mb-2">
      <div class="flex flex-col gap-0.5 min-w-0 flex-1">
        <span class="text-[10px] font-bold uppercase tracking-wider text-gray-400">Contrato</span>
        <span class="text-sm font-semibold text-gray-700 dark:text-gray-300 font-mono tracking-tight truncate">{{ contract().contrato }}</span>
      </div>
      <app-status-badge [status]="contract().status_efetivo || contract().status"></app-status-badge>
    </div>

    <!-- Body -->
    <div class="flex-1 min-w-0">
      <h3 class="text-sm font-semibold leading-snug text-gray-900 dark:text-white transition-colors line-clamp-2"
        [ngClass]="titleHoverClass()">
        {{ contract().contratada }}
      </h3>
    </div>

    <!-- Footer -->
    <div class="pt-3 mt-2 border-t border-gray-100 dark:border-gray-700">
      <div class="flex items-center gap-2" [ngClass]="footerTextClass()">
        <span class="material-symbols-outlined text-[16px]">{{ footerIcon() }}</span>
        <span class="text-[11px] font-medium truncate">{{ footerMessage() }}</span>
      </div>
    </div>
  </div>
